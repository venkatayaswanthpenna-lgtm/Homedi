version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: homedi_user
      POSTGRES_PASSWORD: homedi_password
      POSTGRES_DB: homedi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: homedi_user
      MONGO_INITDB_ROOT_PASSWORD: homedi_password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  mongodb_data:
